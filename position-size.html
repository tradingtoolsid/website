<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Position Size Calculator - TradingToolsID</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0F172A;
    color:white;
}

header{
    background:#081225;
    padding:25px;
    text-align:center;
    border-bottom:3px solid #FBBF24;
}

header h1{
    color:#FBBF24;
    margin:0;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1E293B;
    padding:25px;
    border-radius:15px;
}

input, select{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#FBBF24;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:20px;
    background:#081225;
    padding:20px;
    border-radius:10px;
    text-align:center;
    line-height:1.8;
}

.gold{
    color:#FBBF24;
    font-weight:bold;
}

.green{
    color:#22C55E;
    font-size:24px;
    font-weight:bold;
}

</style>
</head>

<body>

<header>
    <h1>Position Size Calculator</h1>
    <p>TradingToolsID</p>
</header>

<div class="container">

<div class="card">

<h3 style="text-align:center;color:#FBBF24;">
Calculation Mode
</h3>

<select id="mode" onchange="changeMode()">
    <option value="entry">Entry + Stop Loss</option>
    <option value="distance">Dollar Distance</option>
</select>

<input type="number" id="balance" placeholder="Account Balance ($)">

<input type="number" id="risk" placeholder="Risk (%)">

<div id="entryMode">

    <input type="number"
    id="entry"
    placeholder="Entry Price">

    <input type="number"
    id="sl"
    placeholder="Stop Loss Price">

</div>

<div id="distanceMode" style="display:none;">

    <input type="number"
    id="distanceInput"
    placeholder="SL Distance ($)">

</div>

<button onclick="calculate()">
Calculate
</button>

<div class="result" id="result">
Result will appear here
</div>

</div>

</div>

<script>

function changeMode() {

    let mode =
    document.getElementById("mode").value;

    if (mode === "entry") {

        document.getElementById("entryMode").style.display = "block";
        document.getElementById("distanceMode").style.display = "none";

    } else {

        document.getElementById("entryMode").style.display = "none";
        document.getElementById("distanceMode").style.display = "block";

    }

}

function calculate() {

    alert("Tombol Calculate Berhasil Diklik");

}

</script>

</body>
</html>
