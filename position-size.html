<div class="container">

<div class="card">

<h3 style="text-align:center;color:#FBBF24;">
Calculation Mode
</h3>

<select id="mode" onchange="changeMode()">
    <option value="entry">Entry + Stop Loss</option>
    <option value="distance">Dollar Distance</option>
</select>

<input type="number" id="balance" placeholder="Account Balance ($)">

<input type="number" id="risk" placeholder="Risk (%)">

<div id="entryMode">

    <input type="number"
    id="entry"
    placeholder="Entry Price">

    <input type="number"
    id="sl"
    placeholder="Stop Loss Price">

</div>

<div id="distanceMode" style="display:none;">

    <input type="number"
    id="distanceInput"
    placeholder="SL Distance ($)">

</div>

<button onclick="calculate()">
Calculate
</button>

<div class="result" id="result">
Result will appear here
</div>

</div>

</div>

<script>

function changeMode() {

    let mode =
    document.getElementById("mode").value;

    if (mode === "entry") {

        document.getElementById("entryMode").style.display = "block";
        document.getElementById("distanceMode").style.display = "none";

    } else {

        document.getElementById("entryMode").style.display = "none";
        document.getElementById("distanceMode").style.display = "block";

    }

}

function calculate() {

    let balance =
    parseFloat(document.getElementById("balance").value);

    let risk =
    parseFloat(document.getElementById("risk").value);

    if (!balance || !risk) {

        document.getElementById("result").innerHTML =
        "Please fill all fields";

        return;
    }

    let riskAmount =
    balance * (risk / 100);

    let mode =
    document.getElementById("mode").value;

    let distance;

    if (mode === "entry") {

        let entry =
        parseFloat(document.getElementById("entry").value);

        let sl =
        parseFloat(document.getElementById("sl").value);

        if (!entry || !sl) {

            document.getElementById("result").innerHTML =
            "Please fill all fields";

            return;
        }

        distance =
        Math.abs(entry - sl);

    } else {

        distance =
        parseFloat(
        document.getElementById("distanceInput").value
        );

        if (!distance) {

            document.getElementById("result").innerHTML =
            "Please fill all fields";

            return;
        }

    }

    let lot =
    riskAmount / (distance * 10);

    document.getElementById("result").innerHTML =

    "<span class='gold'>Risk Amount:</span> $" +
    riskAmount.toFixed(2)

    +

    "<br><span class='gold'>Price Distance:</span> $" +
    distance.toFixed(2)

    +

    "<br><br><span class='green'>Suggested Lot Size: " +
    lot.toFixed(2) +
    "</span>";

}

</script>
