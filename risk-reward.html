<script>

function calculate(){

let risk =
parseFloat(
document.getElementById("risk").value
);

let reward =
parseFloat(
document.getElementById("reward").value
);

if(!risk || !reward){

document.getElementById("result").innerHTML =
"Please fill all fields";

return;

}

let ratio =
reward / risk;

document.getElementById("result").innerHTML =

"<span class='gold'>Risk:</span> $" +
risk.toFixed(2)

+

"<br><span class='gold'>Reward:</span> $" +
reward.toFixed(2)

+

"<br><br><span class='green'>Risk Reward Ratio = 1 : " +
ratio.toFixed(2) +
"</span>";

}

</script>
