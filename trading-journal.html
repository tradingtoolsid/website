<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trading Journal Pro - TradingToolsID</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0F172A;
color:white;
}

header{
background:#081225;
padding:25px;
text-align:center;
border-bottom:3px solid #FBBF24;
}

header h1{
margin:0;
color:#FBBF24;
}

nav{
margin-top:15px;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

.active{
color:#FBBF24;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#1E293B;
padding:25px;
border-radius:15px;
}

.card h2{
text-align:center;
color:#FBBF24;
margin-top:0;
}

input,
select,
textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:15px;
background:#FBBF24;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:20px;
background:#081225;
padding:20px;
border-radius:10px;
text-align:center;
}

.trade-card{
background:#111827;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.trade-profit{
color:#22C55E;
font-weight:bold;
}

.trade-loss{
color:#EF4444;
font-weight:bold;
}

.delete-btn{
margin-top:10px;
padding:8px 12px;
background:#EF4444;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
width:auto;
}

.delete-btn:hover{
opacity:0.9;
  }

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
}

.stat-card{
background:#111827;
padding:15px;
border-radius:10px;
text-align:center;
}

.stat-title{
font-size:13px;
color:#CBD5E1;
margin-bottom:5px;
}

.stat-value{
font-size:22px;
font-weight:bold;
color:#FBBF24;
  }

.profit-stat{
color:#22C55E;
}

.loss-stat{
color:#EF4444;
  }

.balance-note{
font-size:12px;
color:#94A3B8;
text-align:center;
margin-top:-10px;
margin-bottom:20px;
  }

footer{
text-align:center;
padding:30px;
margin-top:40px;
border-top:1px solid #334155;
color:#CBD5E1;
}

.action-buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.small-btn{
flex:1;
padding:12px;
background:#334155;
color:white;
border:none;
border-radius:10px;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.small-btn:hover{
background:#475569;
}

</style>
</head>

<body>

<header>

<h1>TradingToolsID</h1>

<nav>

<a href="index.html">
Home
</a>

<a href="calculators.html">
Calculators
</a>

<a href="market.html">
Market
</a>

<a href="tools.html" class="active">
Tools
</a>

<a href="#">
Copy Trading
</a>

</nav>

<div style="
margin-top:20px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
">

<a href="trading-journal.html"
style="
background:#FBBF24;
color:#000;
padding:8px 15px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
">
Trading Journal
</a>

</div>

</header>

<div class="container">

<div class="card">

<h2>Trading Journal</h2>

<input
type="number"
id="startingBalance"
placeholder="Starting Balance ($)"
oninput="saveStartingBalance()">
<div class="balance-note">
Balance is stored locally and remains available on this browser.
</div>

<input
type="text"
id="date"
placeholder="Date"
onfocus="this.type='date'"
onblur="if(!this.value)this.type='text'"
>

<input
type="text"
id="pair"
placeholder="Pair (EURUSD, BTCUSD, etc)">

<select id="direction">

<option value="BUY">
BUY
</option>

<option value="SELL">
SELL
</option>

</select>

<input
type="number"
id="resultValue"
placeholder="Profit: 100 | Loss: -100">

<textarea
id="notes"
placeholder="Trade Notes">
</textarea>

<button onclick="saveTrade()">
Save Trade
</button>

<div class="action-buttons">

<button
class="small-btn"
onclick="exportCSV()">
Export CSV
</button>

<button
class="small-btn">
Import CSV
</button>

</div>

<div class="result">

<div id="stats">
</div>

<div id="history">
Result will appear here
</div>

</div>

</div>

</div>

<footer>

<p>© 2026 TradingToolsID</p>

<p>
Founder & Developer: A Ridwan R
</p>

</footer>

<script>

loadTrades();

document.getElementById("date").value = "";
document.getElementById("pair").value = "";
document.getElementById("resultValue").value = "";
document.getElementById("notes").value = "";
document.getElementById("direction").value = "BUY";

function saveTrade(){

let trade = {

date:
document.getElementById("date").value,

pair:
document.getElementById("pair").value,

direction:
document.getElementById("direction").value,

result:
document.getElementById("resultValue").value,

notes:
document.getElementById("notes").value

};

if(
!document.getElementById("date").value ||
!document.getElementById("pair").value ||
!document.getElementById("resultValue").value
){

alert("Please fill all required fields");

return;

}

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

trades.unshift(trade);

localStorage.setItem(
"journal",
JSON.stringify(trades)
);

function saveStartingBalance(){

localStorage.setItem(
"startingBalance",
document.getElementById("startingBalance").value
);

loadTrades();

  }

loadTrades();

document.getElementById("date").value = "";
document.getElementById("pair").value = "";
document.getElementById("resultValue").value = "";
document.getElementById("notes").value = "";
document.getElementById("direction").value = "BUY";

}

function deleteTrade(index){

if(!confirm("Delete this trade?")){
return;
}

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

trades.splice(index,1);

localStorage.setItem(
"journal",
JSON.stringify(trades)
);

loadTrades();

}

function exportCSV(){

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

if(trades.length === 0){

alert("No trade data found");

return;

}

let startingBalance =
parseFloat(
localStorage.getItem("startingBalance")
) || 0;

let currentBalance =
startingBalance;

let netProfit = 0;

let csv =

"Starting Balance," +
startingBalance +
"\n";

trades.forEach(trade=>{

netProfit +=
parseFloat(trade.result);

});

currentBalance =
startingBalance +
netProfit;

let growth =
startingBalance > 0
? ((currentBalance - startingBalance)
/ startingBalance * 100)
: 0;

csv +=
"Current Balance," +
currentBalance.toFixed(2) +
"\n";

csv +=
"Net Profit," +
netProfit.toFixed(2) +
"\n";

csv +=
"Growth %," +
growth.toFixed(2) +
"\n\n";

csv +=
"Date,Pair,Direction,Result,Balance After Trade,Growth %,Notes\n";

let runningBalance =
startingBalance;

trades.forEach(trade=>{

runningBalance +=
parseFloat(trade.result);

let rowGrowth =
startingBalance > 0
? ((runningBalance - startingBalance)
/ startingBalance * 100)
: 0;

csv +=

`"${trade.date}",
"${trade.pair}",
"${trade.direction}",
"${trade.result}",
"${runningBalance.toFixed(2)}",
"${rowGrowth.toFixed(2)}",
"${trade.notes}"\n`;

});

let blob =
new Blob(
[csv],
{
type:"text/csv"
}
);

let url =
window.URL.createObjectURL(blob);

let a =
document.createElement("a");

a.href = url;

a.download =
"TradingJournal.csv";

a.click();

window.URL.revokeObjectURL(url);

}

function loadTrades(){

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

let html = "";

let totalTrades = trades.length;
let wins = 0;
let totalProfit = 0;
let totalLoss = 0;

if(totalTrades===0){

document.getElementById("stats").innerHTML = "";

document.getElementById("history").innerHTML =
"<p style='text-align:center;'>Result will appear here</p>";

return;

}

trades.forEach((trade,index)=>{

let result =
parseFloat(trade.result);

if(result > 0){

wins++;
totalProfit += result;

}else{

totalLoss += Math.abs(result);

}

let colorClass =
result >= 0
? "trade-profit"
: "trade-loss";

html +=

'<div class="trade-card">' +

'<b>Date:</b> ' +
trade.date +

'<br><b>Pair:</b> ' +
trade.pair +

'<br><b>Direction:</b> ' +
trade.direction +

'<br><b>Result:</b> <span class="' +
colorClass +
'">$' +
result.toFixed(2) +
'</span>' +

'<br><b>Notes:</b> ' +
trade.notes +

'<br><button class="delete-btn" onclick="deleteTrade(' + index + ')">Delete</button>' +

'</div>';

});

let winRate =
(totalTrades > 0)
? (wins / totalTrades * 100)
: 0;

let netProfit =
totalProfit - totalLoss;

let startingBalance =
parseFloat(
localStorage.getItem("startingBalance")
) || 0;

let currentBalance =
startingBalance + netProfit;

let growth =
startingBalance > 0
? (netProfit / startingBalance) * 100
: 0;

document.getElementById("stats").innerHTML =

'<div class="stats-grid">' +

'<div class="stat-card">' +
'<div class="stat-title">Starting Balance</div>' +
'<div class="stat-value">$' +
startingBalance.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Current Balance</div>' +
'<div class="stat-value ' +
(currentBalance >= startingBalance
? 'profit-stat'
: 'loss-stat') +
'">$' +
currentBalance.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Growth</div>' +
'<div class="stat-value ' +
(growth >= 0
? 'profit-stat'
: 'loss-stat') +
'">' +
growth.toFixed(2) +
'%</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Total Trades</div>' +
'<div class="stat-value">' +
totalTrades +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Win Rate</div>' +
'<div class="stat-value">' +
winRate.toFixed(1) +
'%</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Profit</div>' +
'<div class="stat-value profit-stat">$' +
totalProfit.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Loss</div>' +
'<div class="stat-value loss-stat">$' +
totalLoss.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Net Profit</div>' +
'<div class="stat-value ' +
(netProfit >= 0 ? 'profit-stat' : 'loss-stat') +
'">$' +
netProfit.toFixed(2) +
'</div></div>' +

'</div>';

document.getElementById("history").innerHTML =
html;

}
</script>

</body>
  </html>
