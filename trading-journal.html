<script>

let editIndex = -1;

let currentPage = 1;
const tradesPerPage = 10;

loadTrades();

document.getElementById("date").value = "";
document.getElementById("pair").value = "";
document.getElementById("resultValue").value = "";
document.getElementById("notes").value = "";
document.getElementById("direction").value = "BUY";

function saveStartingBalance(){

localStorage.setItem(
"startingBalance",
document.getElementById("startingBalance").value
);

loadTrades();

}

function saveTrade(){

let trade = {

date:
document.getElementById("date").value,

pair:
document.getElementById("pair").value,

direction:
document.getElementById("direction").value,

result:
document.getElementById("resultValue").value,

notes:
document.getElementById("notes").value

};

if(
!document.getElementById("date").value ||
!document.getElementById("pair").value ||
!document.getElementById("resultValue").value
){

alert("Please fill all required fields");

return;

}

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

if(editIndex === -1){

trades.unshift(trade);

}else{

trades[editIndex] = trade;

editIndex = -1;

}

localStorage.setItem(
"journal",
JSON.stringify(trades)
);

loadTrades();

document.getElementById("date").value = "";
document.getElementById("pair").value = "";
document.getElementById("resultValue").value = "";
document.getElementById("notes").value = "";
document.getElementById("direction").value = "BUY";
document.getElementById("cancelButton").style.display =
"none";

document.getElementById("saveButton").innerHTML =
"Save Trade";

}

function cancelEdit(){

editIndex = -1;

document.getElementById("date").value = "";
document.getElementById("pair").value = "";
document.getElementById("direction").value = "BUY";
document.getElementById("resultValue").value = "";
document.getElementById("notes").value = "";

document.getElementById("saveButton").innerHTML =
"Save Trade";

document.getElementById("cancelButton").style.display =
"none";

  }

function deleteTrade(index){

if(!confirm("Delete this trade?")){
return;
}

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

trades.splice(index,1);

localStorage.setItem(
"journal",
JSON.stringify(trades)
);

loadTrades();

}

function editTrade(index){

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

let trade =
trades[index];

document.getElementById("date").value =
trade.date;

document.getElementById("pair").value =
trade.pair;

document.getElementById("direction").value =
trade.direction;

document.getElementById("resultValue").value =
trade.result;

document.getElementById("notes").value =
trade.notes;

editIndex = index;

document.getElementById("saveButton").innerHTML =
"Update Trade";

document.getElementById("cancelButton").style.display =
"block";

window.scrollTo({
top:0,
behavior:"smooth"
});

  }

function exportCSV(){

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

if(trades.length === 0){

alert("No trade data found");

return;

}

let startingBalance =
parseFloat(
localStorage.getItem("startingBalance")
) || 0;

let netProfit = 0;

trades.forEach(trade=>{

netProfit +=
parseFloat(trade.result);

});

let currentBalance =
startingBalance + netProfit;

let growth =
startingBalance > 0
? ((currentBalance - startingBalance)
/ startingBalance * 100)
: 0;

let totalTrades = trades.length;

let wins = 0;
let losses = 0;

let grossProfit = 0;
let grossLoss = 0;

trades.forEach(trade=>{

let result = parseFloat(trade.result);

if(result > 0){

wins++;
grossProfit += result;

}else if(result < 0){

losses++;
grossLoss += Math.abs(result);

}

});

let winRate =
totalTrades > 0
? (wins / totalTrades * 100)
: 0;

let profitFactor =
grossLoss > 0
? grossProfit / grossLoss
: 0;

let csv =

"Starting Balance," +
startingBalance +
"\n" +

"Current Balance," +
currentBalance.toFixed(2) +
"\n" +

"Net Profit," +
netProfit.toFixed(2) +
"\n" +

"Growth %," +
growth.toFixed(2) +
"\n\n" +

"Date,Pair,Direction,Result,Balance After Trade,Growth %,Notes\n";

let runningBalance =
startingBalance;

trades.forEach(trade=>{

runningBalance +=
parseFloat(trade.result);

let rowGrowth =
startingBalance > 0
? ((runningBalance - startingBalance)
/ startingBalance * 100)
: 0;

csv +=
`"${trade.date}","${trade.pair}","${trade.direction}","${trade.result}","${runningBalance.toFixed(2)}","${rowGrowth.toFixed(2)}","${trade.notes}"\n`;

});

let blob =
new Blob(
[csv],
{
type:"text/csv"
}
);

let url =
window.URL.createObjectURL(blob);

let a =
document.createElement("a");

a.href = url;

a.download =
"TradingJournal.csv";

a.click();

window.URL.revokeObjectURL(url);

}

function importCSV(event){

if(
!confirm(
"Importing will replace all current journal data. Continue?"
)
){
return;
}

let file =
event.target.files[0];

if(!file){
return;
}

let reader =
new FileReader();

reader.onload = function(e){

let text =
e.target.result;

let rows =
text.split("\n");

let trades = [];

for(let i = 6; i < rows.length; i++){

let row =
rows[i].trim();

if(!row){
continue;
}

let cols =
row.replaceAll('"','').split(",");

if(cols.length < 7){
continue;
}

trades.push({

date: cols[0],
pair: cols[1],
direction: cols[2],
result: cols[3],
notes: cols[6]

});

}

localStorage.setItem(
"journal",
JSON.stringify(trades)
);

let startingBalance =
rows[0].split(",")[1];

localStorage.setItem(
"startingBalance",
startingBalance
);

alert(
"Trading journal imported successfully"
);

loadTrades();

};

reader.readAsText(file);

}

function clearJournal(){

if(
!confirm(
"Delete ALL journal data and reset balance?"
)
){
return;
}

localStorage.removeItem("journal");
localStorage.removeItem("startingBalance");

document.getElementById("pairFilter").value =
"ALL";

document.getElementById("resultFilter").value =
"ALL";

loadTrades();

alert("Journal cleared successfully");

  }

function loadTrades(){

let trades =
JSON.parse(
localStorage.getItem("journal")
) || [];

let startingBalance =
parseFloat(
localStorage.getItem("startingBalance")
) || 0;

document.getElementById("startingBalance").value =
startingBalance || "";

let html = "";

let filteredTrades = [];

let pairFilter =
document.getElementById("pairFilter").value;

let resultFilter =
document.getElementById("resultFilter").value;

let fromDate =
document.getElementById("fromDate").value;

let toDate =
document.getElementById("toDate").value;

let sortFilter =
document.getElementById("sortFilter").value;

let activeFilters = [];

let uniquePairs = [];

trades.forEach(trade=>{

if(
!uniquePairs.includes(trade.pair)
){
uniquePairs.push(trade.pair);
}

});

let pairOptions =
'<option value="ALL">All Pairs</option>';

uniquePairs.forEach(pair=>{

pairOptions +=
'<option value="' +
pair +
'">' +
pair +
'</option>';

});

document.getElementById("pairFilter").innerHTML =
pairOptions;

if(
uniquePairs.includes(pairFilter)
||
pairFilter === "ALL"
){
document.getElementById("pairFilter").value =
pairFilter;
}else{
document.getElementById("pairFilter").value =
"ALL";
}

if(pairFilter !== "ALL"){
activeFilters.push("Pair: " + pairFilter);
}

if(resultFilter === "PROFIT"){
activeFilters.push("Profit Only");
}

if(resultFilter === "LOSS"){
activeFilters.push("Loss Only");
}

if(fromDate){
activeFilters.push("From: " + fromDate);
}

if(toDate){
activeFilters.push("To: " + toDate);
}

if(sortFilter !== "newest"){

const sortNames = {
"oldest":"Oldest First",
"profit-high":"Highest Profit",
"loss-big":"Biggest Loss"
};

activeFilters.push("Sort: " + sortNames[sortFilter]);

  }

let totalTrades = 0;
let wins = 0;
let losses = 0;

let totalProfit = 0;
let totalLoss = 0;

let grossProfit = 0;
let grossLoss = 0;

let averageWin = 0;

let averageLoss = 0;

let averageRR = 0;

let currentWinStreak = 0;
let bestWinningStreak = 0;

let currentLosingStreak = 0;
let worstLosingStreak = 0;

let monthlyStats = {};

let equityData = [];

let allTrades = trades.length;

if(sortFilter === "newest"){

trades.sort((a,b)=>
new Date(b.date)-new Date(a.date));

}

else if(sortFilter === "oldest"){

trades.sort((a,b)=>
new Date(a.date)-new Date(b.date));

}

else if(sortFilter === "profit-high"){

trades.sort((a,b)=>
parseFloat(b.result)-parseFloat(a.result));

}

else if(sortFilter === "loss-big"){

trades.sort((a,b)=>
parseFloat(a.result)-parseFloat(b.result));

  }

trades.forEach((trade,index)=>{

let result =
parseFloat(trade.result);

if(fromDate && trade.date < fromDate){
return;
}

if(toDate && trade.date > toDate){
return;
  }

if(
pairFilter !== "ALL" &&
trade.pair !== pairFilter
){
return;
}

if(
resultFilter === "PROFIT" &&
result <= 0
){
return;
}

if(
resultFilter === "LOSS" &&
result >= 0
){
return;
}

let month = trade.date.substring(0,7);

if(!monthlyStats[month]){

monthlyStats[month] = {

profit: 0,
trades: 0

};

}

monthlyStats[month].profit += result;
monthlyStats[month].trades++;

totalTrades++;

if(result > 0){

wins++;
totalProfit += result;
grossProfit += result;

currentWinStreak++;

if(currentWinStreak > bestWinningStreak){
bestWinningStreak = currentWinStreak;
}

currentLosingStreak = 0;

}else{

losses++;

totalLoss += Math.abs(result);
grossLoss += Math.abs(result);

currentWinStreak = 0;

currentLosingStreak++;

if(currentLosingStreak > worstLosingStreak){
worstLosingStreak = currentLosingStreak;
}

}

filteredTrades.push({
    trade,
    index
});

});

const totalPages =
Math.ceil(filteredTrades.length / tradesPerPage);

if(currentPage > totalPages){
    currentPage = totalPages || 1;
}

const start =
(currentPage - 1) * tradesPerPage;

const end =
start + tradesPerPage;

const pageTrades =
filteredTrades.slice(start, end);

let winRate =
totalTrades > 0
? (wins / totalTrades * 100)
: 0;

let netProfit =
totalProfit - totalLoss;

let currentBalance =
startingBalance + netProfit;

let runningBalance = startingBalance;

trades
.slice()
.reverse()
.forEach(trade=>{

runningBalance += parseFloat(trade.result);

equityData.push(runningBalance);

});

let growth =
startingBalance > 0
? (netProfit / startingBalance) * 100
: 0;

let profitFactor =
grossLoss > 0
? (grossProfit / grossLoss)
: grossProfit > 0
? Infinity
: 0;

averageWin =
wins > 0
? grossProfit / wins
: 0;

averageLoss =
losses > 0
? grossLoss / losses
: 0;

averageRR =
averageLoss > 0
? averageWin / averageLoss
: 0;

let bestMonth = "";
let bestMonthProfit = -Infinity;

let worstMonth = "";
let worstMonthProfit = Infinity;

let monthlyHTML = "";

Object.keys(monthlyStats)
.sort()
.reverse()
.forEach(month=>{

if(monthlyStats[month].profit > bestMonthProfit){

    bestMonthProfit = monthlyStats[month].profit;
    bestMonth = month;

}

if(monthlyStats[month].profit < worstMonthProfit){

    worstMonthProfit = monthlyStats[month].profit;
    worstMonth = month;

  }

let color =
monthlyStats[month].profit >= 0
? "profit-stat"
: "loss-stat";

monthlyHTML +=

'<div class="stat-card">' +

'<div class="stat-title">' +
month +
'</div>' +

'<div class="stat-value ' +
color +
'">$' +
monthlyStats[month].profit.toFixed(2) +
'</div>' +

'<div style="font-size:12px;color:#CBD5E1;margin-top:5px;">' +
monthlyStats[month].trades +
' Trades</div>' +

'</div>';

});

document.getElementById("stats").innerHTML =

'<div class="stats-grid">' +

'<div class="stat-card">' +
'<div class="stat-title">Starting Balance</div>' +
'<div class="stat-value">$' +
startingBalance.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Current Balance</div>' +
'<div class="stat-value ' +
(currentBalance >= startingBalance
? 'profit-stat'
: 'loss-stat') +
'">$' +
currentBalance.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Growth</div>' +
'<div class="stat-value ' +
(growth >= 0
? 'profit-stat'
: 'loss-stat') +
'">' +
growth.toFixed(2) +
'%</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Total Trades</div>' +
'<div class="stat-value">' +
totalTrades +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Win Rate</div>' +
'<div class="stat-value">' +
winRate.toFixed(1) +
'%</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Profit</div>' +
'<div class="stat-value profit-stat">$' +
totalProfit.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Loss</div>' +
'<div class="stat-value loss-stat">$' +
totalLoss.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Net Profit</div>' +
'<div class="stat-value ' +
(netProfit >= 0
? 'profit-stat'
: 'loss-stat') +
'">$' +
netProfit.toFixed(2) +
'</div></div>' +

'<div class="stat-card">' +
'<div class="stat-title">Profit Factor</div>' +
'<div class="stat-value">' +
(profitFactor === Infinity
? "∞"
: profitFactor.toFixed(2)) +
'</div></div>' +

function drawEquityCurve(data){

const canvas =
document.getElementById("equityChart");

if(!canvas) return;

const ctx =
canvas.getContext("2d");

ctx.clearRect(0,0,canvas.width,canvas.height);

const leftPadding = 55;
const rightPadding = 20;
const topPadding = 20;
const bottomPadding = 35;

// GRID
ctx.strokeStyle = "#1E293B";
ctx.lineWidth = 1;

for(let i=0;i<=5;i++){

    let y =
topPadding +
i * ((canvas.height - topPadding - bottomPadding)/5);
    ctx.beginPath();
    ctx.moveTo(leftPadding, y);
ctx.lineTo(canvas.width-rightPadding, y);
    ctx.stroke();

}

if(data.length < 2){

ctx.fillStyle="#94A3B8";
ctx.font="16px Arial";
ctx.fillText(
"Not enough trades",
20,
100
);

return;

}

let max = Math.max(...data);
let min = Math.min(...data);

let range = max - min;

if(range===0){
    range = 1;
}

max += range*0.15;
min -= range*0.15;

// ===== BUILD EQUITY PATH =====

ctx.beginPath();

data.forEach((value,index)=>{

    let x =
    leftPadding +
    (index/(data.length-1)) *
    (canvas.width-leftPadding-rightPadding);

    let y =
    canvas.height-bottomPadding-
    (
    (value-min)/(max-min)
    )
    *
    (canvas.height-topPadding-bottomPadding);

    if(index===0){

        ctx.moveTo(x,y);

    }else{

        ctx.lineTo(x,y);

    }

});

// ===== FILL AREA =====

ctx.lineTo(
canvas.width-rightPadding,
canvas.height-bottomPadding
);

ctx.lineTo(
leftPadding,
canvas.height-bottomPadding
);

ctx.closePath();

ctx.fillStyle = "rgba(16,185,129,0.18)";
ctx.fill();

// ===== DRAW EQUITY LINE =====

ctx.beginPath();

data.forEach((value,index)=>{

    let x =
    leftPadding +
    (index/(data.length-1)) *
    (canvas.width-leftPadding-rightPadding);

    let y =
    canvas.height-bottomPadding-
    (
    (value-min)/(max-min)
    )
    *
    (canvas.height-topPadding-bottomPadding);

    if(index===0){

        ctx.moveTo(x,y);

    }else{

        ctx.lineTo(x,y);

    }

});

ctx.strokeStyle="#10B981";
ctx.lineWidth=4;
ctx.lineJoin="round";
ctx.lineCap="round";
ctx.stroke();

// ===== Y AXIS =====

ctx.fillStyle = "#CBD5E1";
ctx.font = "12px Arial";
ctx.textAlign = "right";

for(let i=0;i<=5;i++){

    let value =
    max - (i*(max-min)/5);

    let y =
    topPadding +
    i*((canvas.height-topPadding-bottomPadding)/5);

    ctx.fillText(
        "$" + value.toFixed(0),
        leftPadding - 8,
        y + 4
    );

  }

ctx.fillStyle="#FBBF24";

data.forEach((value,index)=>{

    let x =
leftPadding +
(index/(data.length-1))
*
(canvas.width-leftPadding-rightPadding);

let y =
canvas.height-bottomPadding-
(
(value-min)/(max-min||1)
)
*
(canvas.height-topPadding-bottomPadding);

    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fill();

});

// ===== X AXIS =====

ctx.fillStyle = "#CBD5E1";
ctx.font = "11px Arial";
ctx.textAlign = "center";

const maxLabels = 8;

for(let i=0;i<data.length;i++){

    if(
        data.length > maxLabels &&
        i % Math.ceil(data.length / maxLabels) !== 0 &&
        i !== data.length - 1
    ){
        continue;
    }

    let x =
    leftPadding +
    (i/(data.length-1)) *
    (canvas.width-leftPadding-rightPadding);

    ctx.fillText(
        i + 1,
        x,
        canvas.height - 10
    );

}

  }
