<script>

function calculateFib(){

let high =
parseFloat(
document.getElementById("high").value
);

let low =
parseFloat(
document.getElementById("low").value
);

if(
isNaN(high) ||
isNaN(low)
){
return;
}

let diff =
high - low;

let levels = [

["0%", high],

["23.6%", high - diff * 0.236],

["38.2%", high - diff * 0.382],

["50%", high - diff * 0.5],

["61.8%", high - diff * 0.618],

["78.6%", high - diff * 0.786],

["100%", low],

["127.2%", low - diff * 0.272],

["161.8%", low - diff * 0.618],

["261.8%", low - diff * 1.618]

];
  
let trend =
high > low
? "Bullish"
: "Bearish";

let html =

'<div style="background:#111827;padding:15px;border-radius:10px;margin-bottom:15px;text-align:center;">' +

'<div style="color:#FBBF24;font-size:22px;font-weight:bold;">' +
trend +
' Trend</div>' +

'<div style="color:#CBD5E1;margin-top:8px;">Golden Zone: 50% - 61.8%</div>' +

'</div>';

levels.forEach(level=>{

let color = "white";

if(
level[0]=="50%" ||
level[0]=="61.8%"
){
color = "#FBBF24";
}

html +=

'<div class="level">' +

'<span>' +
level[0] +
'</span>' +

'<span>' +
level[1].toFixed(2) +
'</span>' +

'</div>';

});

document
.getElementById("fibLevels")
.innerHTML = html;

document
.getElementById("result")
.style.display = "block";

}

</script>
