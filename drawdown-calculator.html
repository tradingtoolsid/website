<div class="input-group">
<label>Starting Balance</label>
<input type="number" id="balance" placeholder="Enter starting balance">
</div>

<div class="input-group">
<label>Drawdown (%)</label>
<input type="number" id="drawdown" placeholder="Enter drawdown percentage">
</div>
  
<button onclick="calculateDrawdown()">
Calculate
</button>

<div class="result-title">Remaining Balance</div>

</div>

<script>

function calculateDrawdown(){

let balance =
parseFloat(
document.getElementById("balance").value
);

let drawdown =
parseFloat(
document.getElementById("drawdown").value
);

if(
isNaN(balance) ||
isNaN(drawdown)
){
return;
}

let remaining =
balance * (1 - drawdown / 100);

let drawdownAmount =
balance - remaining;

let recovery =
(
(balance - remaining)
/
remaining
) * 100;

let riskLevel = "";

if(drawdown <= 10){

riskLevel = "LOW";

}
else if(drawdown <= 20){

riskLevel = "MODERATE";

}
else if(drawdown <= 30){

riskLevel = "HIGH";

}
else{

riskLevel = "DANGEROUS";

}

document.getElementById("remaining")
.innerHTML =
"$" + remaining.toFixed(2);

document.getElementById("drawdownAmount")
.innerHTML =
"$" + drawdownAmount.toFixed(2);

document.getElementById("recovery")
.innerHTML =
recovery.toFixed(2) + "%";

document.getElementById("recoveryAmount")
.innerHTML =
"$" + drawdownAmount.toFixed(2);

document.getElementById("riskLevel")
.innerHTML =
riskLevel;

document.getElementById("result")
.style.display = "block";

}

</script>
