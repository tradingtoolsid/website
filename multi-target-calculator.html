<body>

<header>

<div class="container">

<div class="card">

<h2>Multi Target Calculator</h2>

<input
type="number"
id="entry"
placeholder="Entry Price">

<input
type="number"
id="sl"
placeholder="Stop Loss">

<input
type="number"
id="tp1"
placeholder="Take Profit 1">

<input
type="number"
id="tp2"
placeholder="Take Profit 2">

<input
type="number"
id="tp3"
placeholder="Take Profit 3">

<input
type="number"
id="lot"
placeholder="Lot Size">

<button onclick="calculateTargets()">
Calculate
</button>

<div class="result"
id="result"
style="display:block;">

<div id="output">

Result will appear here

</div>

</div>

</div>

</div>

<footer>

<p>© 2026 TradingToolsID</p>

<p>
Founder & Developer: A Ridwan R
</p>

</footer>

<script>

function calculateTargets(){

let entry =
parseFloat(
document.getElementById("entry").value
);

let sl =
parseFloat(
document.getElementById("sl").value
);

let tp1 =
parseFloat(
document.getElementById("tp1").value
);

let tp2 =
parseFloat(
document.getElementById("tp2").value
);

let tp3 =
parseFloat(
document.getElementById("tp3").value
);

let lot =
parseFloat(
document.getElementById("lot").value
);

if(
isNaN(entry) ||
isNaN(sl) ||
isNaN(tp1) ||
isNaN(tp2) ||
isNaN(tp3) ||
isNaN(lot)
){
return;
}

let risk =
Math.abs(entry - sl);

let direction =
entry > sl
? "BUY"
: "SELL";

let riskDollar =
risk * 100 * lot;
  
function rr(tp){

return (
Math.abs(tp - entry)
/ risk
).toFixed(2);

}

function profit(tp){

return (
Math.abs(tp - entry)
* 100
* lot
).toFixed(2);

}

let bestRR = Math.max(
parseFloat(rr(tp1)),
parseFloat(rr(tp2)),
parseFloat(rr(tp3))
);

let bestTarget;

if(
bestRR ==
parseFloat(rr(tp1))
){

bestTarget = "TP1";

}
else if(
bestRR ==
parseFloat(rr(tp2))
){

bestTarget = "TP2";

}
else{

bestTarget = "TP3";

}

let rating;
let ratingColor;

if(bestRR < 1.5){

rating = "POOR";
ratingColor = "#EF4444";

}
else if(bestRR < 3){

rating = "GOOD";
ratingColor = "#FBBF24";

}
else{

rating = "EXCELLENT";
ratingColor = "#22C55E";

}

let html =

'<div class="result-card">' +
'<b>Direction</b><br>' +
direction +
'</div>' +

'<div class="result-card">' +
'<b>Risk Amount</b><br>$' +
riskDollar.toFixed(2) +
'</div>';

html +=
'<div class="result-card">' +

'<b>TP1</b><br>' +

'RR 1 : ' +
rr(tp1) +

'<br><br>' +

'Profit $' +
profit(tp1) +

'</div>';

html +=
'<div class="result-card">' +

'<b>TP2</b><br>' +

'RR 1 : ' +
rr(tp2) +

'<br><br>' +

'Profit $' +
profit(tp2) +

'</div>';

html +=
'<div class="result-card">' +

'<b>TP3</b><br>' +

'RR 1 : ' +
rr(tp3) +

'<br><br>' +

'Profit $' +
profit(tp3) +

'</div>';

document
.getElementById("output")
.innerHTML = html;

}

</script>

</body>
