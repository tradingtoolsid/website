<input

placeholder="Previous Low">

<input
type="number"

Calculate

<script>

function calculatePivot(){

let high =
parseFloat(
document.getElementById("high").value
);

let low =
parseFloat(
document.getElementById("low").value
);

let close =
parseFloat(
document.getElementById("close").value
);

if(
isNaN(high) ||
isNaN(low) ||
isNaN(close)
){

document.getElementById("result")
.innerHTML =
"Please fill all fields";

return;

}

let pp =
(high + low + close) / 3;

let r1 =
(2 * pp) - low;

let s1 =
(2 * pp) - high;

let r2 =
pp + (high - low);

let s2 =
pp - (high - low);

let r3 =
high + 2 * (pp - low);

let s3 =
low - 2 * (high - pp);

let bias =
close > pp
? "Bullish"
: "Bearish";

document.getElementById("result")
.innerHTML =

'<div class="result-card">' +
'<div class="result-title">Market Bias</div>' +
'<div class="result-value gold">' +
bias +
'</div></div>' +

'<div class="result-card">' +
'<div class="result-title">Pivot Point</div>' +
'<div class="result-value gold">' +
pp.toFixed(2) +
'</div></div>' +

'<div class="result-card">' +
'<div class="result-title">Resistance 1</div>' +
'<div class="result-value green">' +
r1.toFixed(2) +
'</div></div>' +

'<div class="result-card">' +
'<div class="result-title">Resistance 2</div>' +
'<div class="result-value green">' +
r2.toFixed(2) +
'</div></div>' +

'<div class="result-card">' +
'<div class="result-title">Resistance 3</div>' +
'<div class="result-value green">' +
r3.toFixed(2) +
'</div></div>' +

'<div class="result-card">' +
'<div class="result-title">Support 1</div>' +
'<div class="result-value red">' +
s1.toFixed(2) +
'</div></div>' +

'<div class="result-card">' +
'<div class="result-title">Support 2</div>' +
'<div class="result-value red">' +
s2.toFixed(2) +
'</div></div>' +

'<div class="result-card">' +
'<div class="result-title">Support 3</div>' +
'<div class="result-value red">' +
s3.toFixed(2) +
'</div></div>';

}

</script>
